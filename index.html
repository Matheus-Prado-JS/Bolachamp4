<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bolachamp4</title>

  <!-- FAVICON -->
  <link rel="icon" href="assets/logo-FP.png">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles/style.css">
  <link rel="stylesheet" href="styles/projetos.css">
  <link rel="stylesheet" href="styles/video-modal.css">
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="logo">
      <img src="assets/logo-FP.png" alt="Logo Bolachamp4">
    </div>
    <nav>
      <a href="#home">Home</a>
      <a href="#identidade">Contato</a>
    </nav>

  <section id="home" class="hero">

      <h1 data-text="Bolachamp4">Bolachamp4</h1>
      <p data-text="Cinegrafista, Editor e Designer Gráfico">Cinegrafista, Editor e Designer Gráfico</p>

      <div class="buttons">
        <a href="#projetos">Projetos</a>
        <a href="#feedbacks">Feedbacks</a>
        <a href="#contato">Contato</a>
      </div>
    </div>
  </section>
<section id="projetos" class="projetos">
  <h2>Confira meus projetos</h2>

  <div class="carousel horizontal">

        data-desc="Descrição do projeto 01">
      <img src="assets/thumb1.jpg">
      <span>Projeto 01</span>
    </div>

      <div class="video-card" 
          data-video="V5M2WZiAy6k"

        <span>Projeto 02</span>
      </div>

          data-video="p2zMXSXhZ9M"

          data-desc="Descrição do projeto 03">
        <img src="assets/thumb3.jpg">
        <span>Projeto 03</span>
      </div>

    </div>
  </div>

  <!-- VERTICAIS -->
  <div class="carousel vertical">
    <div class="track">

    <div class="video-card vertical" 
        data-video="IfYEkqM4cYA"
        data-type="vertical"
        data-title="Projeto 04"
        data-desc="Descrição do projeto 04">
      <img src="assets/thumb4.jpg">
      <span>Projeto 04</span>
    </div>

      <div class="video-card vertical" 
          data-video="LB7EipbtrQM"
          data-type="vertical"

          data-type="vertical"
          data-title="Projeto 06"
          data-desc="Descrição do projeto 06">
        <img src="assets/thumb6.jpg">
        <span>Projeto 06</span>
      </div>

      <div class="video-card vertical" 
          data-video="_XNIQL_6YzU"
          data-type="vertical"
          data-title="Projeto 07"
          data-desc="Descrição do projeto 07">
        <img src="assets/thumb7.webp">
        <span>Projeto 07</span>
      </div>

    </div>
  </div>

  <a href="#" class="btn-projetos">Ver todos os projetos</a>
</section>

  <!-- SEÇÕES -->
  <section id="feedbacks" class="section">Feedbacks</section>
  <section id="identidade" class="section">Identidade</section>

  <footer id="contato" class="footer">
    <p>📞 (11) 99999-9999</p>

  </footer>

  <script src="scripts/script.js"></script>
  <script src="scripts/projetos.js" defer></script>
  <script src="scripts/video-modal.js" defer></script>

</html>
